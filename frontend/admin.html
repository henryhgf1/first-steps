<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Admin - Loja</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/css/style.css" />
    <script>
      (function () {
        const senha = prompt("Digite a senha de administrador");
        if (senha !== "123") {
          alert("Acesso negado!");
          window.location.href = "index.html";
        }
      })();
    </script>
  </head>
  <body>
    <h1>Painel do Gerente ⚙️</h1>

    <div class="card-produto form-container">
      <form id="form-cadastro">
        <input type="hidden" id="produtoEdicaoId" />
        <h3 id="titulo-form">Cadastrar Novo Tênis</h3>

        <label for="nome">Nome do Produto:</label>
        <input type="text" id="nome" class="input-form" required />

        <label for="preco">Preço (R$):</label>
        <input
          type="number"
          step="0.01"
          id="preco"
          class="input-form"
          required
        />

        <label for="imagemUrl"
          >Caminho da Imagem (ex: src/assets/img/foto.webp):</label
        >
        <input type="text" id="imagemUrl" class="input-form" required />

        <label for="descricao">Descrição:</label>
        <textarea
          id="descricao"
          class="campo-descricao"
          placeholder="Digite uma descrição detalhada aqui..."
          rows="4"
          required
        ></textarea>

        <label for="estilo">Estilo:</label>
        <select id="estilo" class="input-form" required>
          <option value="">Selecione um estilo...</option>
          <option value="casual">Casual</option>
          <option value="esportivo">Esportivo</option>
          <option value="social">Social</option>
          <option value="streetwear">Streetwear</option>
        </select>

        <button
          type="button"
          id="btn-cancelar-edicao"
          class="btn-cancelar"
          style="display: none"
          onclick="cancelarEdicao()"
        >
          Cancelar Edição
        </button>

        <button type="submit" class="btn-salvar">
          <span id="btn-salvar-texto">Salvar Produto no Banco</span>
        </button>
      </form>
    </div>

    <hr class="linha-divisoria-admin" />
    <h2 class="titulo-admin">Estoque Atual 📦</h2>

    <div id="lista-admin-produtos" class="container-estoque"></div>

    <script src="src/js/admin.js"></script>
  </body>
</html>
